apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  replicas: {{ .Values.keycloak.replicas }}
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: "{{ .Values.keycloak.image.repository }}:{{ .Values.keycloak.image.tag }}"
        imagePullPolicy: {{ .Values.keycloak.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.keycloak.service.targetPort }}
          protocol: TCP
        env:
        - name: KC_DB
          value: "{{ .Values.database.vendor }}"
        - name: KC_DB_URL
          value: "jdbc:postgresql://{{ .Values.database.host }}:{{ .Values.database.port }}/{{ .Values.postgres.database }}"
        - name: KC_DB_USERNAME
          value: "{{ .Values.postgres.username }}"
        - name: KC_DB_PASSWORD
          value: "{{ .Values.postgres.password }}"
        - name: KC_PROXY
          value: "edge"
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin123"  # POC only - should use Secrets in production
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health/ready
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            memory: "{{ .Values.keycloak.resources.requests.memory }}"
            cpu: "{{ .Values.keycloak.resources.requests.cpu }}"
          limits:
            memory: "{{ .Values.keycloak.resources.limits.memory }}"
            cpu: "{{ .Values.keycloak.resources.limits.cpu }}"
