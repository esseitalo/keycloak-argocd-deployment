{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  labels:
    app: postgres
    chart: {{ .Chart.Name }}-{{ .Chart.Version }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.database.port }}
    targetPort: postgres
    protocol: TCP
    name: postgres
  selector:
    app: postgres
{{- end }}
